<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI API Integration</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }

        #response {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            background: #f9f9f9;
            min-height: 100px;
        }
    </style>
</head>
<body>

    <h2>AI API Integration Demo</h2>

    <textarea
        id="prompt"
        placeholder="Enter your question here..."
    ></textarea>

    <button onclick="askAI()">Ask AI</button>

    <div id="response">
        AI response will appear here...
    </div>

    <script>
        async function askAI() {

            const prompt =
                document.getElementById("prompt").value;

            const responseBox =
                document.getElementById("response");

            if (!prompt.trim()) {
                responseBox.innerHTML =
                    "Please enter a question.";
                return;
            }

            responseBox.innerHTML = "Generating response...";

            try {

                // Your backend endpoint
                const response = await fetch(
                    "https://your-backend.com/api/ai",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            prompt: prompt
                        })
                    }
                );

                const data = await response.json();

                responseBox.innerHTML =
                    data.response || "No response received.";

            } catch (error) {
                console.error(error);

                responseBox.innerHTML =
                    "Error connecting to AI service.";
            }
        }
    </script>

</body>
</html>
