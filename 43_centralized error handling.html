<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centralized Error Handling</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width: 700px;
    margin: 40px auto;
}

button{
    padding: 10px 20px;
    margin: 10px;
    cursor: pointer;
}

#errorBox{
    display: none;
    background: #ffe6e6;
    color: #d8000c;
    border: 1px solid #d8000c;
    padding: 15px;
    margin-top: 20px;
    border-radius: 5px;
}

#successBox{
    display: none;
    background: #e8ffe8;
    color: #2e7d32;
    border: 1px solid #2e7d32;
    padding: 15px;
    margin-top: 20px;
    border-radius: 5px;
}
</style>
</head>
<body>

<h1>Centralized Error Handling Demo</h1>

<button onclick="loadData()">Load Data</button>
<button onclick="generateError()">Generate Error</button>

<div id="errorBox"></div>
<div id="successBox"></div>

<script>
// Centralized Error Handler
function handleError(error) {

    const errorBox = document.getElementById("errorBox");
    const successBox = document.getElementById("successBox");

    successBox.style.display = "none";

    errorBox.style.display = "block";
    errorBox.innerHTML =
        "<strong>Error:</strong> " + error.message;

    console.error("Application Error:", error);
}

// Centralized Success Handler
function showSuccess(message) {

    const errorBox = document.getElementById("errorBox");
    const successBox = document.getElementById("successBox");

    errorBox.style.display = "none";

    successBox.style.display = "block";
    successBox.innerHTML = message;
}

// Example API Call
async function loadData() {

    try {

        const response = await fetch(
            "https://jsonplaceholder.typicode.com/users"
        );

        if (!response.ok) {
            throw new Error(
                "Failed to fetch data. Status: "
                + response.status
            );
        }

        const data = await response.json();

        showSuccess(
            "Loaded " + data.length + " users successfully."
        );

    } catch(error) {
        handleError(error);
    }
}

// Example Manual Error
function generateError() {

    try {

        throw new Error(
            "This is a sample application error."
        );

    } catch(error) {
        handleError(error);
    }
}

// Global JavaScript Error Handler
window.onerror = function(
    message,
    source,
    line,
    column,
    error
) {
    handleError(
        error || new Error(message)
    );

    return true;
};

// Global Promise Rejection Handler
window.addEventListener(
    "unhandledrejection",
    function(event) {

        handleError(
            event.reason ||
            new Error("Unhandled Promise Rejection")
        );
    }
);
</script>

</body>
</html>
