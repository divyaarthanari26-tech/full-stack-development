<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    text-align:center;
}

.card h2{
    color:#555;
    margin-bottom:10px;
}

.card p{
    font-size:28px;
    font-weight:bold;
    color:#007bff;
}

button{
    display:block;
    margin:20px auto;
    padding:10px 20px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#218838;
}
</style>
</head>
<body>

<h1>Analytics Dashboard</h1>

<div class="dashboard">

    <div class="card">
        <h2>Total Users</h2>
        <p id="users">0</p>
    </div>

    <div class="card">
        <h2>Total Orders</h2>
        <p id="orders">0</p>
    </div>

    <div class="card">
        <h2>Revenue</h2>
        <p id="revenue">$0</p>
    </div>

    <div class="card">
        <h2>Visitors</h2>
        <p id="visitors">0</p>
    </div>

</div>

<button onclick="loadAnalytics()">
    Load Analytics Data
</button>

<script>

// Sample Analytics API Endpoint
const API_URL = "https://jsonplaceholder.typicode.com/users";

async function loadAnalytics(){

    try{

        const response = await fetch(API_URL);
        const data = await response.json();

        document.getElementById("users").innerText =
            data.length;

        document.getElementById("orders").innerText =
            Math.floor(Math.random()*500);

        document.getElementById("revenue").innerText =
            "$" + Math.floor(Math.random()*100000);

        document.getElementById("visitors").innerText =
            Math.floor(Math.random()*10000);

    }
    catch(error){

        console.error("API Error:", error);
        alert("Failed to load analytics data");

    }
}

</script>

</body>
</html>
