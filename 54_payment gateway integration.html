<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Gateway Integration</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
}

.container{
    width:400px;
    margin:50px auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#218838;
}

#status{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

    <h2>Payment Form</h2>

    <input type="text" id="customerName"
           placeholder="Customer Name">

    <input type="email" id="customerEmail"
           placeholder="Email Address">

    <input type="number" id="amount"
           placeholder="Amount">

    <button onclick="processPayment()">
        Pay Now
    </button>

    <div id="status"></div>

</div>

<script>

async function processPayment(){

    const name =
        document.getElementById("customerName").value;

    const email =
        document.getElementById("customerEmail").value;

    const amount =
        document.getElementById("amount").value;

    if(!name || !email || !amount){
        alert("Please fill all fields");
        return;
    }

    document.getElementById("status").innerHTML =
        "Processing Payment...";

    try{

        /*
        Replace with your backend payment API

        Example:
        POST /api/create-payment
        */

        const response = await fetch(
            "/api/create-payment",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    name:name,
                    email:email,
                    amount:amount
                })
            }
        );

        const result = await response.json();

        document.getElementById("status").innerHTML =
            "Payment Successful. Transaction ID: " +
            result.transactionId;

    }
    catch(error){

        document.getElementById("status").innerHTML =
            "Payment Failed";

        console.error(error);
    }
}

</script>

</body>
</html>
