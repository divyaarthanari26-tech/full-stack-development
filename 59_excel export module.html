<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel Export Module</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th, td{
    border:1px solid #ddd;
    padding:10px;
    text-align:left;
}

th{
    background:#007bff;
    color:white;
}

button{
    margin-top:20px;
    padding:12px 20px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#218838;
}
</style>
</head>
<body>

<div class="container">

    <h2>Employee Report</h2>

    <table id="employeeTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Department</th>
                <th>Salary</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>101</td>
                <td>John Doe</td>
                <td>IT</td>
                <td>50000</td>
            </tr>
            <tr>
                <td>102</td>
                <td>Jane Smith</td>
                <td>HR</td>
                <td>45000</td>
            </tr>
            <tr>
                <td>103</td>
                <td>David Wilson</td>
                <td>Finance</td>
                <td>60000</td>
            </tr>
        </tbody>
    </table>

    <button onclick="exportToExcel()">
        Export to Excel
    </button>

</div>

<!-- SheetJS Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>

function exportToExcel(){

    const table =
        document.getElementById("employeeTable");

    const workbook =
        XLSX.utils.table_to_book(table, {
            sheet: "Employees"
        });

    XLSX.writeFile(
        workbook,
        "Employee_Report.xlsx"
    );
}

</script>

</body>
</html>
