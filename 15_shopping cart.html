<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.container{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.products{
    flex:2;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.product{
    background:#fff;
    padding:15px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    text-align:center;
}

.product img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:8px;
}

.product h3{
    margin:10px 0;
}

.product p{
    font-size:20px;
    color:#2563eb;
    font-weight:bold;
}

button{
    background:#2563eb;
    color:#fff;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

.cart{
    flex:1;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    min-width:300px;
}

.cart h2{
    margin-bottom:15px;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
    border-bottom:1px solid #ddd;
    padding-bottom:8px;
}

.total{
    margin-top:15px;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>
<body>

<h1>Shopping Cart Demo</h1>

<div class="container">

    <!-- Products -->
    <div class="products">

        <div class="product">
            <img src="https://via.placeholder.com/250x180" alt="Headphones">
            <h3>Wireless Headphones</h3>
            <p>$99</p>
            <button onclick="addToCart('Wireless Headphones', 99)">
                Add to Cart
            </button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/250x180" alt="Smart Watch">
            <h3>Smart Watch</h3>
            <p>$149</p>
            <button onclick="addToCart('Smart Watch', 149)">
                Add to Cart
            </button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/250x180" alt="Speaker">
            <h3>Bluetooth Speaker</h3>
            <p>$79</p>
            <button onclick="addToCart('Bluetooth Speaker', 79)">
                Add to Cart
            </button>
        </div>

    </div>

    <!-- Cart -->
    <div class="cart">
        <h2>🛒 Cart</h2>

        <div id="cartItems"></div>

        <div class="total">
            Total: $<span id="total">0</span>
        </div>
    </div>

</div>

<script>
let cart = [];
let total = 0;

function addToCart(name, price) {
    cart.push({name, price});
    total += price;

    updateCart();
}

function updateCart() {
    const cartItems = document.getElementById("cartItems");
    cartItems.innerHTML = "";

    cart.forEach((item, index) => {
        cartItems.innerHTML += `
            <div class="cart-item">
                <span>${item.name}</span>
                <span>$${item.price}</span>
            </div>
        `;
    });

    document.getElementById("total").textContent = total;
}
</script>

</body>
</html>
