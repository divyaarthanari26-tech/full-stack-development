<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Management</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.profile-container{
    background:#fff;
    width:100%;
    max-width:700px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    overflow:hidden;
}

.profile-header{
    background:#2563eb;
    color:#fff;
    text-align:center;
    padding:30px;
}

.profile-header img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:4px solid #fff;
    object-fit:cover;
}

.profile-header h2{
    margin-top:15px;
}

.profile-body{
    padding:30px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

.form-group input,
.form-group textarea,
.form-group select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

.form-group textarea{
    resize:vertical;
}

.button-group{
    display:flex;
    gap:15px;
    margin-top:20px;
}

.btn{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.btn-save{
    background:#2563eb;
    color:white;
}

.btn-save:hover{
    background:#1d4ed8;
}

.btn-cancel{
    background:#e5e7eb;
}

.btn-cancel:hover{
    background:#d1d5db;
}

@media(max-width:600px){
    .button-group{
        flex-direction:column;
    }
}
</style>
</head>
<body>

<div class="profile-container">

    <div class="profile-header">
        <img src="https://via.placeholder.com/120" alt="Profile Picture">
        <h2>John Doe</h2>
        <p>Web Developer</p>
    </div>

    <div class="profile-body">
        <form>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" value="John Doe">
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" value="john@example.com">
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" value="+91 9876543210">
            </div>

            <div class="form-group">
                <label>Gender</label>
                <select>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Bio</label>
                <textarea rows="4">Passionate web developer with experience in frontend and backend technologies.</textarea>
            </div>

            <div class="button-group">
                <button type="submit" class="btn btn-save">Save Changes</button>
                <button type="reset" class="btn btn-cancel">Cancel</button>
            </div>

        </form>
    </div>

</div>

</body>
</html>
