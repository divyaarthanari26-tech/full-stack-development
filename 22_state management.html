<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>State Management Example</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    width: 350px;
}

h1 {
    margin-bottom: 20px;
}

.counter {
    font-size: 40px;
    margin: 20px 0;
    color: #007bff;
}

button {
    padding: 10px 18px;
    margin: 5px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    color: white;
}

.increment {
    background: #28a745;
}

.decrement {
    background: #dc3545;
}

.reset {
    background: #6c757d;
}
</style>
</head>
<body>

<div class="container">
    <h1>State Management Demo</h1>

    <div class="counter" id="counterValue">0</div>

    <button class="increment" onclick="increment()">
        Increase
    </button>

    <button class="decrement" onclick="decrement()">
        Decrease
    </button>

    <button class="reset" onclick="resetCounter()">
        Reset
    </button>
</div>

<script>
/* Centralized State */
const state = {
    count: 0
};

/* Render Function */
function render() {
    document.getElementById("counterValue").textContent = state.count;
}

/* State Update Functions */
function increment() {
    state.count++;
    render();
}

function decrement() {
    state.count--;
    render();
}

function resetCounter() {
    state.count = 0;
    render();
}

/* Initial Render */
render();
</script>

</body>
</html>
